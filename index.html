<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Gem Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
        }

        #gameContainer {
            position: relative;
            background: #0f0f1e;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.5);
            overflow: hidden;
            border: 3px solid #667eea;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #1e90ff 0%, #87ceeb 50%, #90ee90 100%);
            image-rendering: pixelated;
        }

        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #667eea;
            min-width: 200px;
        }

        #levelInfo {
            font-weight: bold;
            margin-bottom: 8px;
            color: #ffd700;
            font-size: 16px;
        }

        #gemsCollected {
            margin-bottom: 5px;
            color: #ffd700;
        }

        #health {
            margin-bottom: 5px;
            color: #ff6b6b;
        }

        #score {
            color: #4CAF50;
        }

        #controls {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: #fff;
            font-size: 11px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #667eea;
        }

        #controls div {
            margin-bottom: 3px;
        }

        #levelComplete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(20, 20, 40, 0.95));
            color: white;
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }

        #levelComplete h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        #levelComplete p {
            font-size: 16px;
            margin-bottom: 12px;
        }

        #levelComplete button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        #levelComplete button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(40, 20, 20, 0.95));
            color: white;
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #ff6b6b;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.5);
        }

        #gameOver h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        #gameOver button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        #gameOver button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        #allLevelsComplete {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(20, 40, 20, 0.95));
            color: white;
            padding: 40px 60px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #00ff00;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
        }

        #allLevelsComplete h2 {
            font-size: 42px;
            margin-bottom: 20px;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        #allLevelsComplete p {
            font-size: 18px;
            margin-bottom: 12px;
        }

        #allLevelsComplete button {
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.4);
        }

        #allLevelsComplete button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 255, 0, 0.6);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div id="ui">
            <div id="levelInfo">Level 1</div>
            <div id="gemsCollected">💎 Gems: 0/5</div>
            <div id="health">❤️ Health: 3</div>
            <div id="score">⭐ Score: 0</div>
        </div>
        <div id="controls">
            <div><strong>⌨️ CONTROLS:</strong></div>
            <div>A/D - Move | SPACE - Jump</div>
            <div>Collect all gems! 💎</div>
        </div>
        <div id="levelComplete">
            <h2>Level Complete! 🎉</h2>
            <p id="levelStats"></p>
            <button onclick="nextLevel()">Next Level →</button>
        </div>
        <div id="gameOver">
            <h2>Game Over! 💀</h2>
            <p id="gameOverStats"></p>
            <button onclick="restartGame()">Try Again</button>
        </div>
        <div id="allLevelsComplete">
            <h2>🏆 ALL LEVELS COMPLETE! 🏆</h2>
            <p id="finalStats"></p>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game States
        let gameState = {
            currentLevel: 1,
            gemsCollected: 0,
            health: 3,
            score: 0,
            levelComplete: false,
            gameOver: false,
            cameraX: 0
        };

        // Player Object
        const player = {
            x: 50,
            y: 300,
            width: 25,
            height: 35,
            velocityX: 0,
            velocityY: 0,
            isJumping: false,
            isWallSticking: false,
            direction: 1,
            speed: 6,
            jumpPower: 14,
            gravity: 0.7,
            lastGroundY: 0
        };

        // Input Handler
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key === ' ') e.preventDefault();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Generate 30 Levels
        const levels = generateLevels();

        function generateLevels() {
            const levelArray = [];
            
            for (let levelNum = 1; levelNum <= 30; levelNum++) {
                const difficulty = Math.min(4, Math.floor((levelNum - 1) / 6));
                const levelData = {
                    platforms: [],
                    gems: [],
                    spikes: [],
                    boxes: [],
                    enemies: [],
                    wallAreas: [],
                    levelWidth: 1200 + (difficulty * 400)
                };

                // Ground
                levelData.platforms.push({ x: 0, y: levelData.levelWidth - 50, width: levelData.levelWidth, height: 50, type: 'normal', passThrough: false });

                // Generate level layout based on difficulty
                let currentX = 200;
                const gemSpacing = 250 + (difficulty * 50);
                
                for (let i = 0; i < 5 + difficulty * 2; i++) {
                    const platformWidth = 80 + Math.random() * 60;
                    const platformHeight = 20;
                    const yPos = 550 - (i * 120) - Math.random() * 40;

                    levelData.platforms.push({
                        x: currentX,
                        y: yPos,
                        width: platformWidth,
                        height: platformHeight,
                        type: 'normal',
                        passThrough: false
                    });

                    // Add gems
                    levelData.gems.push({
                        x: currentX + platformWidth / 2 - 10,
                        y: yPos - 30,
                        collected: false,
                        radius: 8
                    });

                    // Add hazards on higher difficulties
                    if (difficulty > 0 && Math.random() > 0.5) {
                        levelData.spikes.push({
                            x: currentX + 20,
                            y: yPos - 20,
                            width: platformWidth - 40,
                            height: 20
                        });
                    }

                    // Add enemies
                    if (difficulty > 1 && Math.random() > 0.6) {
                        levelData.enemies.push({
                            x: currentX + 50,
                            y: yPos - 50,
                            width: 25,
                            height: 25,
                            dirX: 1,
                            speed: 1.5 + difficulty * 0.5,
                            minX: currentX,
                            maxX: currentX + platformWidth + 100
                        });
                    }

                    // Add wall areas on higher difficulties
                    if (difficulty > 2 && Math.random() > 0.7) {
                        levelData.wallAreas.push({
                            x: currentX - 40,
                            y: yPos - 150,
                            width: 25,
                            height: 150,
                            type: 'safe'
                        });
                    }

                    currentX += gemSpacing;
                }

                // Add final gem at the end
                levelData.gems.push({
                    x: currentX - 100,
                    y: 100,
                    collected: false,
                    radius: 8
                });

                levelArray.push(levelData);
            }

            return levelArray;
        }

        let currentLevelData = levels[0];

        // Collision Detection
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Update Camera
        function updateCamera() {
            gameState.cameraX = Math.max(0, player.x - 200);
            gameState.cameraX = Math.min(gameState.cameraX, currentLevelData.levelWidth - canvas.width);
        }

        // Update Player
        function updatePlayer() {
            // Movement
            player.velocityX = 0;
            if (keys['a'] || keys['arrowleft']) {
                player.velocityX = -player.speed;
                player.direction = -1;
            }
            if (keys['d'] || keys['arrowright']) {
                player.velocityX = player.speed;
                player.direction = 1;
            }

            // Jump
            if ((keys[' '] || keys['w']) && !player.isJumping) {
                player.velocityY = -player.jumpPower;
                player.isJumping = true;
            }

            // Wall Stick Check
            player.isWallSticking = false;
            for (let wall of currentLevelData.wallAreas) {
                const checkRect = {
                    x: player.x + (player.direction > 0 ? player.width - 10 : -10),
                    y: player.y,
                    width: 15,
                    height: player.height
                };
                
                if (checkCollision(checkRect, wall) && wall.type === 'safe' && keys['x']) {
                    player.isWallSticking = true;
                    player.velocityY = Math.min(player.velocityY, 1);
                    break;
                }
            }

            // Apply gravity
            if (!player.isWallSticking) {
                player.velocityY += player.gravity;
            }

            // Update position
            player.x += player.velocityX;
            player.y += player.velocityY;

            // Bounds
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > currentLevelData.levelWidth) player.x = currentLevelData.levelWidth - player.width;

            // Platform collision
            for (let platform of currentLevelData.platforms) {
                if (checkCollision(player, platform)) {
                    // Coming from above
                    if (player.velocityY > 0 && player.y + player.height - player.velocityY <= platform.y + 5) {
                        player.y = platform.y - player.height;
                        player.velocityY = 0;
                        player.isJumping = false;
                    }
                    // Coming from below (pass-through platforms)
                    else if (player.velocityY < 0 && !platform.passThrough && player.y + player.height - player.velocityY >= platform.y + platform.height - 5) {
                        player.y = platform.y + platform.height;
                        player.velocityY = 0;
                    }
                }
            }

            // Fall off map
            if (player.y > canvas.height + 200) {
                takeDamage();
            }

            // Spike collision
            for (let spike of currentLevelData.spikes) {
                if (checkCollision(player, spike)) {
                    takeDamage();
                }
            }

            // Enemy collision
            for (let enemy of currentLevelData.enemies) {
                if (checkCollision(player, enemy)) {
                    takeDamage();
                }
            }

            // Gem collection
            for (let gem of currentLevelData.gems) {
                if (!gem.collected) {
                    const dist = Math.sqrt(
                        Math.pow(player.x + player.width / 2 - gem.x, 2) +
                        Math.pow(player.y + player.height / 2 - gem.y, 2)
                    );
                    
                    if (dist < 30) {
                        gem.collected = true;
                        gameState.gemsCollected++;
                        gameState.score += 100 + (gameState.currentLevel * 10);
                    }
                }
            }

            updateCamera();
        }

        // Take Damage
        function takeDamage() {
            gameState.health--;
            if (gameState.health <= 0) {
                gameState.gameOver = true;
                document.getElementById('gameOverStats').innerHTML = `
                    Level: ${gameState.currentLevel}<br>
                    Gems Collected: ${gameState.gemsCollected}<br>
                    Score: ${gameState.score}
                `;
                document.getElementById('gameOver').style.display = 'block';
            } else {
                player.x = 50;
                player.y = 300;
                player.velocityX = 0;
                player.velocityY = 0;
                gameState.cameraX = 0;
            }
        }

        // Update Enemies
        function updateEnemies() {
            for (let enemy of currentLevelData.enemies) {
                enemy.x += enemy.dirX * enemy.speed;
                
                if (enemy.x < enemy.minX || enemy.x + enemy.width > enemy.maxX) {
                    enemy.dirX *= -1;
                }
            }
        }

        // Check Level Complete
        function checkLevelComplete() {
            const totalGems = currentLevelData.gems.length;
            if (gameState.gemsCollected >= totalGems && !gameState.levelComplete) {
                gameState.levelComplete = true;
                document.getElementById('levelStats').innerHTML = `
                    All gems collected!<br>
                    Health Remaining: ${gameState.health} ❤️<br>
                    Score: ${gameState.score} ⭐
                `;
                document.getElementById('levelComplete').style.display = 'block';
            }
        }

        // Draw Functions
        function drawPlayer() {
            const screenX = player.x - gameState.cameraX;
            
            ctx.fillStyle = player.isWallSticking ? '#FF1493' : '#4A90E2';
            ctx.shadowColor = 'rgba(74, 144, 226, 0.8)';
            ctx.shadowBlur = 10;
            ctx.fillRect(screenX, player.y, player.width, player.height);
            ctx.shadowColor = 'transparent';
            
            // Eyes
            ctx.fillStyle = 'white';
            ctx.fillRect(screenX + 5, player.y + 8, 5, 5);
            ctx.fillRect(screenX + 15, player.y + 8, 5, 5);
            
            // Pupils
            ctx.fillStyle = 'black';
            ctx.fillRect(screenX + 6, player.y + 9, 3, 3);
            ctx.fillRect(screenX + 16, player.y + 9, 3, 3);
        }

        function drawPlatforms() {
            for (let platform of currentLevelData.platforms) {
                const screenX = platform.x - gameState.cameraX;
                
                if (screenX + platform.width > 0 && screenX < canvas.width) {
                    // Gradient
                    const gradient = ctx.createLinearGradient(screenX, platform.y, screenX, platform.y + platform.height);
                    gradient.addColorStop(0, '#8B5A3C');
                    gradient.addColorStop(1, '#654321');
                    ctx.fillStyle = gradient;
                    
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                    ctx.shadowBlur = 5;
                    ctx.fillRect(screenX, platform.y, platform.width, platform.height);
                    ctx.shadowColor = 'transparent';
                    
                    // Border
                    ctx.strokeStyle = '#3D2817';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(screenX, platform.y, platform.width, platform.height);
                    
                    // Details
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    for (let i = 0; i < platform.width; i += 15) {
                        ctx.fillRect(screenX + i, platform.y + 2, 10, 3);
                    }
                }
            }
        }

        function drawGems() {
            for (let gem of currentLevelData.gems) {
                if (!gem.collected) {
                    const screenX = gem.x - gameState.cameraX;
                    
                    if (screenX + 20 > 0 && screenX < canvas.width) {
                        ctx.fillStyle = '#FFD700';
                        ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
                        ctx.shadowBlur = 15;
                        
                        // Diamond shape
                        ctx.beginPath();
                        ctx.moveTo(screenX, gem.y - gem.radius);
                        ctx.lineTo(screenX + gem.radius, gem.y);
                        ctx.lineTo(screenX, gem.y + gem.radius);
                        ctx.lineTo(screenX - gem.radius, gem.y);
                        ctx.closePath();
                        ctx.fill();
                        
                        // Shine effect
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        ctx.beginPath();
                        ctx.arc(screenX - 3, gem.y - 3, 3, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.shadowColor = 'transparent';
                    }
                }
            }
        }

        function drawSpikes() {
            for (let spike of currentLevelData.spikes) {
                const screenX = spike.x - gameState.cameraX;
                
                if (screenX + spike.width > 0 && screenX < canvas.width) {
                    ctx.fillStyle = '#FF4444';
                    ctx.shadowColor = 'rgba(255, 68, 68, 0.6)';
                    ctx.shadowBlur = 8;
                    
                    for (let i = 0; i < spike.width; i += 20) {
                        ctx.beginPath();
                        ctx.moveTo(screenX + i, spike.y + spike.height);
                        ctx.lineTo(screenX + i + 10, spike.y);
                        ctx.lineTo(screenX + i + 20, spike.y + spike.height);
                        ctx.closePath();
                        ctx.fill();
                    }
                    
                    ctx.shadowColor = 'transparent';
                }
            }
        }

        function drawEnemies() {
            for (let enemy of currentLevelData.enemies) {
                const screenX = enemy.x - gameState.cameraX;
                
                if (screenX + enemy.width > 0 && screenX < canvas.width) {
                    ctx.fillStyle = '#E74C3C';
                    ctx.shadowColor = 'rgba(231, 76, 60, 0.7)';
                    ctx.shadowBlur = 10;
                    ctx.fillRect(screenX, enemy.y, enemy.width, enemy.height);
                    ctx.shadowColor = 'transparent';
                    
                    // Eyes
                    ctx.fillStyle = 'white';
                    ctx.fillRect(screenX + 4, enemy.y + 4, 5, 5);
                    ctx.fillRect(screenX + 16, enemy.y + 4, 5, 5);
                    
                    ctx.fillStyle = 'black';
                    ctx.fillRect(screenX + 5, enemy.y + 5, 3, 3);
                    ctx.fillRect(screenX + 17, enemy.y + 5, 3, 3);
                }
            }
        }

        function drawWallAreas() {
            for (let wall of currentLevelData.wallAreas) {
                const screenX = wall.x - gameState.cameraX;
                
                if (screenX + wall.width > 0 && screenX < canvas.width) {
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.2)';
                    ctx.fillRect(screenX, wall.y, wall.width, wall.height);
                    
                    ctx.strokeStyle = '#4CAF50';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(screenX, wall.y, wall.width, wall.height);
                }
            }
        }

        function updateUI() {
            const totalGems = currentLevelData.gems.length;
            document.getElementById('gemsCollected').textContent = `💎 Gems: ${gameState.gemsCollected}/${totalGems}`;
            document.getElementById('health').textContent = `❤️ Health: ${gameState.health}`;
            document.getElementById('levelInfo').textContent = `Level ${gameState.currentLevel}/30`;
            document.getElementById('score').textContent = `⭐ Score: ${gameState.score}`;
        }

        // Game Loop
        function gameLoop() {
            if (!gameState.gameOver && !gameState.levelComplete) {
                // Clear canvas with gradient
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#1e90ff');
                gradient.addColorStop(0.5, '#87ceeb');
                gradient.addColorStop(1, '#90ee90');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Update
                updatePlayer();
                updateEnemies();
                checkLevelComplete();

                // Draw
                drawWallAreas();
                drawPlatforms();
                drawSpikes();
                drawEnemies();
                drawGems();
                drawPlayer();

                // Update UI
                updateUI();
            }

            requestAnimationFrame(gameLoop);
        }

        // Global Functions
        window.nextLevel = function() {
            gameState.currentLevel++;
            if (gameState.currentLevel > 30) {
                document.getElementById('finalStats').innerHTML = `
                    <strong>You conquered all 30 levels!</strong><br><br>
                    Final Score: ${gameState.score} ⭐<br>
                    Total Gems: ${gameState.gemsCollected}<br>
                    Health Remaining: ${gameState.health} ❤️<br><br>
                    <em>Amazing performance!</em>
                `;
                document.getElementById('allLevelsComplete').style.display = 'block';
                return;
            }
            
            currentLevelData = JSON.parse(JSON.stringify(levels[gameState.currentLevel - 1]));
            gameState.levelComplete = false;
            gameState.gemsCollected = 0;
            player.x = 50;
            player.y = 300;
            player.velocityX = 0;
            player.velocityY = 0;
            gameState.cameraX = 0;
            document.getElementById('levelComplete').style.display = 'none';
        };

        window.restartGame = function() {
            gameState = {
                currentLevel: 1,
                gemsCollected: 0,
                health: 3,
                score: 0,
                levelComplete: false,
                gameOver: false,
                cameraX: 0
            };
            currentLevelData = JSON.parse(JSON.stringify(levels[0]));
            player.x = 50;
            player.y = 300;
            player.velocityX = 0;
            player.velocityY = 0;
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('levelComplete').style.display = 'none';
            document.getElementById('allLevelsComplete').style.display = 'none';
        };

        // Start Game
        gameLoop();
    </script>
</body>
</html>
